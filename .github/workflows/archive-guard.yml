name: Archive Guard

on:
  pull_request:
    paths:
      - 'archive/**'
      - 'docs/archive/**'
      - '.backup/**'
      - '**/_archive/**'
      - '**/backup/**'
      - '**/backups/**'
      - '.gitattributes'
      - '.github/workflows/archive-guard.yml'
      - 'scripts/control-plane/git-safety.mjs'
      - 'docs/processes/clone-guide.md'
      - 'docs/governance/cleanup-manifest.md'
      - 'docs/INDEX.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archive-guard:
    name: Block tracked archive directories
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run archive and large-file guard
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            node scripts/control-plane/git-safety.mjs archive-guard "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}"
          else
            node scripts/control-plane/git-safety.mjs archive-guard
          fi
