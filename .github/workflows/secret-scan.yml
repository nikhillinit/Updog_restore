name: Secret Scan

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Blocking Gitleaks Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install pinned Gitleaks binary
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            --output "/tmp/${archive}"
          echo "${GITLEAKS_SHA256}  /tmp/${archive}" | sha256sum --check --strict
          mkdir -p "$RUNNER_TEMP/gitleaks"
          tar -xzf "/tmp/${archive}" -C "$RUNNER_TEMP/gitleaks" gitleaks
          echo "$RUNNER_TEMP/gitleaks" >> "$GITHUB_PATH"

      - name: Prove the scanner detects a generated negative control
        env:
          GITLEAKS_BIN: gitleaks
        run: node scripts/verify-secret-scanner-negative-control.mjs

      - name: Scan repository history
        run: |
          mkdir -p reports
          gitleaks git \
            --config .gitleaks.toml \
            --no-banner \
            --redact \
            --report-format json \
            --report-path reports/gitleaks-redacted.json \
            .

      - name: Upload redacted findings
        if: ${{ failure() && hashFiles('reports/gitleaks-redacted.json') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: gitleaks-redacted-${{ github.run_id }}
          path: reports/gitleaks-redacted.json
          if-no-files-found: error
          retention-days: 7
