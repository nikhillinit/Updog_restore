name: Documentation Routing Check

on:
  # Generated discovery outputs are committed and also uploaded as workflow
  # artifacts. Source, generator, or committed output changes run validation.
  push:
    branches: [main]
    paths:
      - 'docs/**/*.md'
      - 'cheatsheets/**/*.md'
      - '.claude/**/*.md'
      - 'docs/DISCOVERY-MAP.source.yaml'
      - 'docs/_generated/router-index.json'
      - 'docs/_generated/router-fast.json'
      - 'docs/_generated/staleness-report.md'
      - 'scripts/generate-discovery-map.ts'
      - 'scripts/routeQueryFast.ts'
  pull_request:
    paths:
      - 'docs/**/*.md'
      - 'cheatsheets/**/*.md'
      - '.claude/**/*.md'
      - 'docs/DISCOVERY-MAP.source.yaml'
      - 'docs/_generated/router-index.json'
      - 'docs/_generated/router-fast.json'
      - 'docs/_generated/staleness-report.md'
      - 'scripts/generate-discovery-map.ts'
      - 'scripts/routeQueryFast.ts'
  workflow_dispatch:

jobs:
  validate-routing:
    name: Validate Discovery Routing
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          restore-tool-cache: 'false'

      - name: Validate committed routing artifacts
        id: routing-check
        run: |
          echo "::group::Discovery Map Validation"
          npm run docs:routing:check:ci
          echo "::endgroup::"

      - name: Generate routing artifacts
        if: always()
        run: npm run docs:routing:generate

      - name: Summarize staleness report
        if: always()
        run: |
          echo "::group::Staleness Report"
          if [ -f "docs/_generated/staleness-report.md" ]; then
            cat docs/_generated/staleness-report.md
          else
            echo "docs/_generated/staleness-report.md is missing"
          fi
          echo "::endgroup::"

          if [ -f "docs/_generated/staleness-report.md" ]; then
            STALE_COUNT=$(grep -c "^\- \[ \]" docs/_generated/staleness-report.md || echo "0")
            echo "### Documentation Staleness Check" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Stale documents found:** ${STALE_COUNT}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "See \`docs/_generated/staleness-report.md\` for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload generated artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: discovery-routing-artifacts
          path: |
            docs/_generated/router-index.json
            docs/_generated/router-fast.json
            docs/_generated/staleness-report.md
          retention-days: 7
