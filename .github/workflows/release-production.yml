name: Release Production

on:
  workflow_dispatch:
    inputs:
      expected_sha:
        description: Exact current main SHA to release
        type: string
        required: true
      deployment_url:
        description: Staged Vercel production deployment URL for expected_sha
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: release-production
  cancel-in-progress: false

jobs:
  validate-target:
    name: Validate Production Target
    runs-on: ubuntu-latest
    steps:
      - name: Require exact current main SHA
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Production release must be dispatched from main."
            exit 1
          fi
          if [[ ! "$EXPECTED_SHA" =~ ^[0-9a-f]{40}$ || "$GITHUB_SHA" != "$EXPECTED_SHA" ]]; then
            echo "expected_sha must equal the exact current main SHA."
            exit 1
          fi

  release-proof:
    name: Full Release Proof
    needs: validate-target
    uses: ./.github/workflows/release-proof.yml
    with:
      expected_sha: ${{ inputs.expected_sha }}

  schema-audit:
    name: Clean Production Schema Audit
    needs: release-proof
    uses: ./.github/workflows/prod-schema-reconcile.yml
    with:
      mode: audit
      expected_sha: ${{ inputs.expected_sha }}
    secrets: inherit

  validate-deployment:
    name: Validate Staged Deployment Identity
    needs: schema-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: Production
    outputs:
      deployment_url: ${{ steps.verify.outputs.deployment_url }}
    steps:
      - name: Normalize and verify exact staged deployment
        id: verify
        env:
          DEPLOYMENT_URL: ${{ inputs.deployment_url }}
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: |
          : "${VERCEL_TOKEN:?VERCEL_TOKEN is required}"
          : "${VERCEL_ORG_ID:?VERCEL_ORG_ID is required}"
          : "${VERCEL_PROJECT_ID:?VERCEL_PROJECT_ID is required}"
          node <<'NODE'
          const fs = require('node:fs');
          const url = new URL(process.env.DEPLOYMENT_URL);
          const host = url.hostname.toLowerCase();
          const validHost = /^[a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.vercel\.app$/.test(host);
          const validUrl =
            url.protocol === 'https:' &&
            url.username === '' &&
            url.password === '' &&
            url.port === '' &&
            url.pathname === '/' &&
            url.search === '' &&
            url.hash === '' &&
            validHost;
          if (!validUrl) {
            console.error('deployment_url must be a bare HTTPS vercel.app deployment URL.');
            process.exit(1);
          }
          fs.writeFileSync(`${process.env.RUNNER_TEMP}/vercel-deployment-host.txt`, host);
          NODE
          DEPLOYMENT_HOST="$(cat "$RUNNER_TEMP/vercel-deployment-host.txt")"
          curl --fail --silent --show-error \
            --header "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v13/deployments/${DEPLOYMENT_HOST}?teamId=${VERCEL_ORG_ID}" \
            --output "$RUNNER_TEMP/vercel-deployment.json"
          node <<'NODE'
          const fs = require('node:fs');
          const deployment = JSON.parse(
            fs.readFileSync(`${process.env.RUNNER_TEMP}/vercel-deployment.json`, 'utf8')
          );
          const requestedHost = fs
            .readFileSync(`${process.env.RUNNER_TEMP}/vercel-deployment-host.txt`, 'utf8')
            .trim();
          const deploymentHost = String(deployment.url ?? '').toLowerCase();
          const valid =
            deployment.readyState === 'READY' &&
            deployment.target === 'production' &&
            deployment.projectId === process.env.VERCEL_PROJECT_ID &&
            deployment.meta?.githubCommitSha === process.env.EXPECTED_SHA &&
            deployment.meta?.githubCommitRef === 'main' &&
            deploymentHost === requestedHost;
          if (!valid) {
            console.error('Staged deployment does not match the exact production release target.');
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `deployment_url=https://${deploymentHost}\n`);
          console.log('Staged deployment identity verified.');
          NODE

  staged-smoke:
    name: Authenticated Staged Production Smoke
    needs: validate-deployment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.expected_sha }}

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env

      - name: Require non-skippable smoke credentials
        env:
          PRODUCTION_URL: ${{ needs.validate-deployment.outputs.deployment_url }}
          HEALTH_KEY: ${{ secrets.HEALTH_KEY }}
          METRICS_KEY: ${{ secrets.METRICS_KEY }}
          PROD_SMOKE_USERNAME: ${{ secrets.PROD_SMOKE_USERNAME }}
          PROD_SMOKE_PASSWORD: ${{ secrets.PROD_SMOKE_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          RUM_ALLOWED_ORIGIN: ${{ vars.PRODUCTION_URL }}
        run: |
          : "${PRODUCTION_URL:?PRODUCTION_URL is required}"
          : "${HEALTH_KEY:?HEALTH_KEY is required}"
          : "${METRICS_KEY:?METRICS_KEY is required}"
          : "${PROD_SMOKE_USERNAME:?PROD_SMOKE_USERNAME is required}"
          : "${PROD_SMOKE_PASSWORD:?PROD_SMOKE_PASSWORD is required}"
          : "${VERCEL_AUTOMATION_BYPASS_SECRET:?VERCEL_AUTOMATION_BYPASS_SECRET is required}"
          : "${RUM_ALLOWED_ORIGIN:?RUM_ALLOWED_ORIGIN is required}"

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run authenticated staged smoke
        env:
          PRODUCTION_URL: ${{ needs.validate-deployment.outputs.deployment_url }}
          HEALTH_KEY: ${{ secrets.HEALTH_KEY }}
          METRICS_KEY: ${{ secrets.METRICS_KEY }}
          PROD_SMOKE_USERNAME: ${{ secrets.PROD_SMOKE_USERNAME }}
          PROD_SMOKE_PASSWORD: ${{ secrets.PROD_SMOKE_PASSWORD }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          RUM_ALLOWED_ORIGIN: ${{ vars.PRODUCTION_URL }}
        run: npx playwright test tests/smoke/production-boundaries.spec.ts --project=production --reporter=line

  promote:
    name: Promote Staged Vercel Deployment
    needs: [staged-smoke, validate-deployment]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production
    steps:
      - name: Re-fence live main before promotion # <-- NEW, first step
        env:
          EXPECTED_SHA: ${{ inputs.expected_sha }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! LIVE_MAIN="$(gh api "repos/${REPO}/commits/main" --jq '.sha')"; then
            echo "::error::Could not resolve live main HEAD; refusing to promote (fail-closed)."
            exit 1
          fi
          if [[ ! "$LIVE_MAIN" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Unexpected live main SHA '${LIVE_MAIN}'; refusing to promote (fail-closed)."
            exit 1
          fi
          if [[ "$LIVE_MAIN" != "$EXPECTED_SHA" ]]; then
            echo "::error::main advanced from ${EXPECTED_SHA} to ${LIVE_MAIN} during this release run; refusing to promote a stale deployment. Re-dispatch Release Production for the current main SHA."
            exit 1
          fi
          echo "Live main still equals release target ${EXPECTED_SHA}; promotion authorized."

      - name: Promote verified deployment
        env:
          DEPLOYMENT_URL: ${{ needs.validate-deployment.outputs.deployment_url }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        # Vercel can auto-promote the merge-created deployment before this step runs
        # (#1091); a bare `vercel promote` then 409s "already the current production
        # deployment" and skips post-promotion smoke. Treat that case as a no-op
        # success ONLY after independently confirming, via the Vercel API, that the
        # deployment serving PRODUCTION_URL is the exact staged deployment this run
        # verified. Any other promote failure stays fatal.
        run: |
          set -euo pipefail
          if npx --yes vercel@55.0.0 promote "$DEPLOYMENT_URL" --yes --timeout=5m --token="$VERCEL_TOKEN"; then
            echo "Promoted $DEPLOYMENT_URL"
            exit 0
          fi
          echo "Promote failed; checking whether the staged deployment already serves production..."
          deployment_id() {
            local host="$1" id=""
            id=$(curl -sf -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v13/deployments/${host}" | jq -r '.id // empty') || true
            if [ -z "$id" ]; then
              id=$(curl -sf -H "Authorization: Bearer $VERCEL_TOKEN" \
                "https://api.vercel.com/v13/deployments/${host}?teamId=${VERCEL_ORG_ID}" | jq -r '.id // empty') || true
            fi
            echo "$id"
          }
          staged_host=$(echo "$DEPLOYMENT_URL" | sed -E 's#^https?://##; s#/.*$##')
          prod_host=$(echo "$PRODUCTION_URL" | sed -E 's#^https?://##; s#/.*$##')
          staged_id=$(deployment_id "$staged_host")
          prod_id=$(deployment_id "$prod_host")
          echo "staged deployment: ${staged_id:-<unresolved>} | current production: ${prod_id:-<unresolved>}"
          if [ -n "$staged_id" ] && [ "$staged_id" = "$prod_id" ]; then
            echo "Staged deployment is already the current production deployment; promote is a verified no-op."
            exit 0
          fi
          echo "Current production does not match the verified staged deployment; promote failure is real."
          exit 1

  post-promotion-smoke:
    name: Authenticated Post-promotion Smoke
    needs: promote
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: Production
    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.expected_sha }}

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run authenticated production smoke
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          HEALTH_KEY: ${{ secrets.HEALTH_KEY }}
          METRICS_KEY: ${{ secrets.METRICS_KEY }}
          PROD_SMOKE_USERNAME: ${{ secrets.PROD_SMOKE_USERNAME }}
          PROD_SMOKE_PASSWORD: ${{ secrets.PROD_SMOKE_PASSWORD }}
        run: |
          : "${PRODUCTION_URL:?PRODUCTION_URL is required}"
          : "${HEALTH_KEY:?HEALTH_KEY is required}"
          : "${METRICS_KEY:?METRICS_KEY is required}"
          : "${PROD_SMOKE_USERNAME:?PROD_SMOKE_USERNAME is required}"
          : "${PROD_SMOKE_PASSWORD:?PROD_SMOKE_PASSWORD is required}"
          npx playwright test tests/smoke/production-boundaries.spec.ts --project=production --reporter=line
