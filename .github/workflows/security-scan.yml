name: Security Deep Scan

# Triggers run on every PR/push to main so this required check always reports a
# status. The auto_docs_only fast path classifies changes internally and reports
# success without running the heavy scans (Trivy FS/container, OWASP, SBOM).
# Schedule and manual dispatches run the full pipeline unconditionally.
on:
  schedule:
    - cron: '0 3 * * 1' # Weekly on Monday at 3 AM UTC
  workflow_dispatch:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      auto_docs_only: ${{ steps.filter.outputs.auto_docs == 'true' && steps.filter.outputs.not_auto_docs == 'false' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - name: Detect changed file paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: '.github/path-filters.yml'

  fast-path:
    name: security-scan (auto_docs_only fast path)
    needs: changes
    if: needs.changes.outputs.auto_docs_only == 'true' && github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Report fast-path success
        run: |
          echo "auto_docs_only=true; security scans skipped." >> "$GITHUB_STEP_SUMMARY"
          echo "This job stays green so security-scan can remain a required branch check." >> "$GITHUB_STEP_SUMMARY"

  filesystem-scan:
    needs: changes
    if: needs.changes.outputs.auto_docs_only != 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
      - name: Upload Trivy FS results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-fs-results.sarif') != '' }}
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

  container-scan:
    needs: changes
    if: needs.changes.outputs.auto_docs_only != 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Build Docker image
        run: |
          docker build -t povc-fund-platform:latest .
      - name: Run Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'povc-fund-platform:latest'
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
      - name: Upload Trivy container results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-container-results.sarif') != '' }}
        with:
          sarif_file: 'trivy-container-results.sarif'
          category: 'trivy-container'

  license-check:
    needs: changes
    if: needs.changes.outputs.auto_docs_only != 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20.19.0'
          cache: 'npm'
      - run: npm ci
      - name: Check licenses
        # buffers@0.1.1 has MIT license at source but declares "Custom" in package.json
        # BlueOak-1.0.0 is a permissive license (used by jackspeak, etc.)
        run: npx license-checker --production --onlyAllow 'MIT;Apache-2.0;BSD;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;0BSD;Python-2.0;MPL-2.0;BlueOak-1.0.0' --excludePackages 'buffers@0.1.1'

  dependency-check:
    needs: changes
    if: needs.changes.outputs.auto_docs_only != 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        id: depcheck
        with:
          project: 'POVC-Fund-Platform'
          path: '.'
          format: 'ALL'
          args: >-
            --enableRetired
            --enableExperimental
            --suppression suppression.xml
            ${{ secrets.NVD_API_KEY && format('--nvdApiKey {0}', secrets.NVD_API_KEY) || '' }}
      - name: Upload results
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: dependency-check-reports
          path: reports/
          retention-days: 30
      - name: Upload to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('reports/dependency-check-report.sarif') != '' }}
        with:
          sarif_file: reports/dependency-check-report.sarif

  sbom:
    needs: changes
    if: needs.changes.outputs.auto_docs_only != 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20.19.0'
          cache: 'npm'
      - run: npm ci
      - name: Generate SBOM
        run: |
          npx -y @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.cyclonedx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 30
