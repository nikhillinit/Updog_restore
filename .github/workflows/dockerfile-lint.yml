name: Dockerfile Security Linting

on:
  pull_request:
    paths:
      - 'Dockerfile*'
      - '.github/workflows/dockerfile-lint.yml'
  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - '.github/workflows/dockerfile-lint.yml'

permissions:
  contents: read
  security-events: write

jobs:
  hadolint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: false

      - name: Upload Hadolint results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint

      - name: Hadolint summary
        if: failure()
        run: |
          echo "[FAIL] Dockerfile security issues found. Check the Security tab for details."
          echo "Visit https://github.com/hadolint/hadolint#rules for rule documentation."
