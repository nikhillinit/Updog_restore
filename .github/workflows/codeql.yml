name: CodeQL
# Triggers always start so this workflow can be a required check; the heavy
# init/autobuild/analyze sequence is gated on whether the change set is more
# than the auto_docs allowlist (.github/path-filters.yml). Schedule and manual
# dispatches always run the full analysis.
on:
  push: { branches: [main] }
  pull_request: { branches: [main] }
  schedule: [{ cron: '0 3 * * 1' }]
  workflow_dispatch:
permissions:
  actions: read
  contents: read
  security-events: write
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code_security: ${{ steps.filter.outputs.pr_security }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2
      - name: Detect changed file paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: '.github/path-filters.yml'

  analyze:
    needs: changes
    runs-on: ubuntu-latest
    env:
      RUN_FULL: ${{ needs.changes.outputs.code_security == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Report fast-path skip
        if: env.RUN_FULL != 'true'
        run: |
          echo "No code security changes detected; CodeQL scan skipped." >> "$GITHUB_STEP_SUMMARY"
          echo "This job stays green so CodeQL can be a required branch check." >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        if: env.RUN_FULL == 'true'
      - uses: github/codeql-action/init@v4
        if: env.RUN_FULL == 'true'
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql-config.yml
      - uses: github/codeql-action/analyze@v4
        if: env.RUN_FULL == 'true'
