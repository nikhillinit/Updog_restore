name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      claude_review_relevant: ${{ steps.filter.outputs.claude_review_relevant }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2

      - name: Detect changed file paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: .github/path-filters.yml

  claude-review:
    name: Claude Code Review
    needs: changes
    if: |
      github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'run:claude-review') &&
      needs.changes.outputs.claude_review_relevant == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Claude review preflight
        id: claude-preflight
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          if [[ "$GH_ACTOR" == "dependabot[bot]" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Claude review skipped for Dependabot actor." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [[ -z "$CLAUDE_CODE_OAUTH_TOKEN" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Claude review skipped because CLAUDE_CODE_OAUTH_TOKEN is unavailable." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        id: claude-review
        if: steps.claude-preflight.outputs.ready == 'true'
        uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
