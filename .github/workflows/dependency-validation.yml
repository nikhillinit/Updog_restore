name: Dependency Validation Windows

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  validate-windows:
    name: Windows dependency validation
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm

      - name: Align npm with packageManager
        run: npm install -g npm@10.9.2

      - name: Toolchain sanity check
        shell: pwsh
        run: |
          if ((node -v) -ne 'v20.19.0') { throw "Unexpected Node version: $(node -v)" }
          if ((npm -v) -ne '10.9.2') { throw "Unexpected npm version: $(npm -v)" }

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run quick doctor
        run: npm run doctor:quick
