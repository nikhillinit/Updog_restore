name: Code Quality Metrics

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  metrics:
    name: Code quality metrics
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Count quality metrics
        run: |
          any_count=$(grep -rE ":\s*any\b" client server shared --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l | xargs || echo "0")
          disable_count=$(grep -rE "eslint-disable(-next-line|-line)?" client server shared --include="*.ts" --include="*.tsx" 2>/dev/null | wc -l | xargs || echo "0")
          echo "## Code Quality Metrics" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Current |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ---: |" >> "$GITHUB_STEP_SUMMARY"
          echo "| any annotations | $any_count |" >> "$GITHUB_STEP_SUMMARY"
          echo "| eslint-disable comments | $disable_count |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Blocking lint and typecheck now run through CI Unified." >> "$GITHUB_STEP_SUMMARY"
