name: Bundle Size Check

on:
  pull_request:
    branches: [main, feat/iteration-a-deterministic-engine]
    paths:
      - 'client/**'
      - 'shared/**'
      - 'vite.config.ts'
      - 'package.json'
      - '.size-limit.json'
      - 'scripts/check-budgets.cjs'
      - '.github/workflows/bundle-size-check.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  build-base:
    name: Build Base Branch
    runs-on: ubuntu-latest
    outputs:
      artifact-ready: ${{ steps.base-artifact.outputs.ready }}
    steps:
      - uses: actions/checkout@v6
        with:
          path: pr-tools

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}
          path: base-branch

      - name: Restore base bundle report cache
        id: base-report-cache
        uses: actions/cache@v4
        with:
          path: base-branch/size-limit-report.json
          key: bundle-base-v1-${{ runner.os }}-${{ github.event.pull_request.base.sha }}-${{ hashFiles('pr-tools/scripts/check-budgets.cjs', 'pr-tools/.size-limit.json', 'pr-tools/scripts/compare-bundle-size.js') }}

      - uses: actions/setup-node@v6
        if: steps.base-report-cache.outputs.cache-hit != 'true'
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: |
            pr-tools/package-lock.json
            base-branch/package-lock.json

      - name: Align npm with packageManager
        if: steps.base-report-cache.outputs.cache-hit != 'true'
        run: npm install -g npm@10.9.2

      - id: base-install
        if: steps.base-report-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        run: npm ci
        working-directory: base-branch

      - id: base-build
        if: steps.base-report-cache.outputs.cache-hit != 'true' && steps.base-install.outcome == 'success'
        continue-on-error: true
        run: npm run build
        working-directory: base-branch
        env:
          NODE_ENV: production
          BUILD_WITH_PREACT: '1'

      - id: base-budgets
        if: steps.base-report-cache.outputs.cache-hit != 'true' && steps.base-build.outcome == 'success'
        continue-on-error: true
        run: node ../pr-tools/scripts/check-budgets.cjs --json > size-limit-report.json
        working-directory: base-branch

      - id: base-artifact
        if: always()
        shell: bash
        run: |
          if [ -f base-branch/size-limit-report.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Note inherited base branch failure
        if: always() && steps.base-artifact.outputs.ready != 'true'
        shell: bash
        run: |
          echo "::warning::Base branch bundle baseline could not be generated. This check will validate the PR branch only and skip size comparison until main is healthy."

      - uses: actions/upload-artifact@v7
        if: steps.base-artifact.outputs.ready == 'true'
        with:
          name: base-size-results
          path: base-branch/size-limit-report.json

  build-pr:
    name: Build PR Branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Align npm with packageManager
        run: npm install -g npm@10.9.2

      - run: npm ci

      - run: npm run build
        env:
          NODE_ENV: production
          BUILD_WITH_PREACT: '1'

      - run: node scripts/check-budgets.cjs --json > size-limit-report.json

      - uses: actions/upload-artifact@v7
        with:
          name: pr-size-results
          path: size-limit-report.json

  compare:
    name: Compare Bundle Sizes
    needs: [build-base, build-pr]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        if: needs.build-base.outputs.artifact-ready == 'true'
        with:
          name: base-size-results
          path: base-results

      - uses: actions/download-artifact@v8
        with:
          name: pr-size-results
          path: pr-results

      - name: Compare sizes
        if: needs.build-base.outputs.artifact-ready == 'true'
        run: |
          mv base-results/size-limit-report.json size-limit-base.json
          mv pr-results/size-limit-report.json size-limit-current.json
          node scripts/compare-bundle-size.js

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const hasBaseReport = fs.existsSync('bundle-size-diff.json');
            const marker = '<!-- bundle-size-report -->';
            let comment = `${marker}\n## Bundle Size Report\n\n`;

            if (!hasBaseReport) {
              comment += 'Baseline comparison skipped because the base branch bundle build did not complete successfully.\n\n';
              comment += '[PASS] PR branch bundle build succeeded; re-run comparison after the base branch is healthy.\n';
            } else {
              const diff = JSON.parse(fs.readFileSync('bundle-size-diff.json', 'utf8'));

              comment += '| Bundle | Current | Base | Diff | Status |\n';
              comment += '|--------|---------|------|------|--------|\n';

              for (const item of diff) {
                const status = item.deltaBytes > 0 ? '[+] ' : '[-] ';
                comment += `| ${item.name} | ${item.current} | ${item.base} | ${status}${item.diff} | ${item.withinLimit ? '[PASS]' : '[FAIL]'} |\n`;
              }

              comment += '\n' + (diff.some(d => !d.withinLimit)
                ? '[FAIL] **Some bundles exceed limits!**'
                : '[PASS] All bundles within limits');
            }

            const prNumber = context.payload.pull_request?.number || context.issue?.number;
            if (!prNumber) {
              console.log('No PR number found, skipping comment');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existing = comments.find(item => item.user.type === 'Bot' && item.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            }

      - name: Fail if limits exceeded
        if: needs.build-base.outputs.artifact-ready == 'true'
        run: |
          if [ -f bundle-size-diff.json ]; then
            if grep -q '"exceedsLimit":true' bundle-size-diff.json; then
              echo "[FAIL] Bundle size limits exceeded!"
              exit 1
            fi
          fi
